name: Build Mobile Preview APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile-customer/**'
      - 'apps/mobile-vendor/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      app:
        type: choice
        description: Which app to build
        options: [mobile-customer, mobile-vendor]
        default: mobile-customer
        required: true
      profile:
        type: choice
        description: EAS profile
        options: [preview, production]
        default: preview
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install workspace deps
        run: npm ci
      - name: Typecheck target app
        working-directory: apps/${{ github.event.inputs.app || 'mobile-customer' }}
        run: npx tsc --noEmit
      - name: Build via EAS
        working-directory: apps/${{ github.event.inputs.app || 'mobile-customer' }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
